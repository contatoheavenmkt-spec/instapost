# Variante pra VPS que JÁ TEM Nginx (ou outro reverse proxy) rodando no host.
# Sobe APENAS o app + worker headless — quem faz HTTPS e roteia pra cá é o Nginx do host.
#
# Uso:
#   docker compose -f docker-compose.nginx.yml up -d --build
#
# O Nginx no host fala com http://127.0.0.1:8000 (porta só local, não exposta na internet).
#
# Worker headless: corre 24/7, pega jobs da fila e posta usando session.json
# (vindo de Save Sessão via extensão OU worker local). Sem Chrome, sem GUI.
# Variáveis obrigatórias em .env ao lado deste arquivo:
#   PUBLIC_BASE_URL=https://instapost.shop
#   VPS_WORKER_TOKEN=<token gerado em /workers no painel>

services:
  app:
    build: .
    image: insta-poster:latest
    container_name: insta-poster-app
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      HTTPS_ONLY: "1"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      TZ: America/Sao_Paulo
    volumes:
      - ./data:/data
    ports:
      # Bind só em 127.0.0.1 — fica invisível pra internet,
      # só o Nginx do host consegue acessar.
      - "127.0.0.1:8000:8000"

  worker:
    # Reusa a mesma imagem do app (já tem instagrapi, ffmpeg, requirements.txt)
    image: insta-poster:latest
    container_name: insta-poster-worker
    restart: unless-stopped
    depends_on:
      - app
    command: ["python", "worker.py"]
    environment:
      # Fala com o app via rede interna do Docker (sem passar pelo nginx/HTTPS)
      SERVER_URL: http://app:8000
      WORKER_TOKEN: ${VPS_WORKER_TOKEN}
      WORKER_NAME: "VPS"
      DATA_DIR: /data
      WORKER_CONCURRENCY: "1"  # 1 thread = mais seguro contra ban (jobs serializados)
      TZ: America/Sao_Paulo
    volumes:
      # MESMO volume que o app — worker lê/escreve session.json em
      # /data/workspaces/<ws>/sessions/<user>.json. Sincronização automática.
      - ./data:/data
