<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Insta Poster{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #09090b;
      --surface: #101013;
      --surface-2: #161619;
      --border: #1f1f23;
      --border-2: #2a2a30;
      --text: #fafafa;
      --text-2: #a1a1aa;
      --text-3: #71717a;
      --accent: #ec4899;
      --accent-soft: rgba(236, 72, 153, 0.12);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    * { -webkit-font-smoothing: antialiased; }
    html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }

    /* surfaces */
    .surface { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
    .surface-2 { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; }
    .divider { height: 1px; background: var(--border); }

    /* buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 12px; border-radius: 6px; font-weight: 500; font-size: 13px; line-height: 1; transition: all .12s; cursor: pointer; border: 1px solid transparent; user-select: none; white-space: nowrap; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-primary:hover { background: #e4e4e7; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: #d8377f; }
    .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border-2); }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }
    .btn-subtle { background: var(--surface-2); color: var(--text-2); }
    .btn-subtle:hover { background: #1f1f23; color: var(--text); }
    .btn-danger { background: transparent; color: #fca5a5; border-color: #3a1014; }
    .btn-danger:hover { background: #1a0708; color: #fecaca; border-color: #501318; }
    .btn-sm { padding: 5px 9px; font-size: 12px; }
    .btn .icon { width: 14px; height: 14px; }

    /* inputs */
    .input, .select, .textarea { width: 100%; background: var(--bg); border: 1px solid var(--border-2); border-radius: 6px; padding: 8px 11px; color: var(--text); font-size: 13px; font-family: inherit; transition: border-color .12s, box-shadow .12s; }
    .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .label { display: block; font-size: 12px; color: var(--text-2); font-weight: 500; margin-bottom: 6px; }

    /* toggle switch */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider { position: absolute; cursor: pointer; inset: 0; background: var(--border-2); border-radius: 999px; transition: .15s; }
    .switch .slider::before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .15s; }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(14px); }

    /* status dot */
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
    .dot-success { background: var(--success); box-shadow: 0 0 0 2px rgba(16,185,129,.15); }
    .dot-warning { background: var(--warning); box-shadow: 0 0 0 2px rgba(245,158,11,.15); }
    .dot-danger { background: var(--danger); box-shadow: 0 0 0 2px rgba(239,68,68,.15); }
    .dot-muted { background: var(--text-3); }
    .dot-pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    /* badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; line-height: 1.4; border: 1px solid transparent; }
    .badge-success { background: rgba(16,185,129,.1); color: #6ee7b7; border-color: rgba(16,185,129,.2); }
    .badge-warning { background: rgba(245,158,11,.1); color: #fcd34d; border-color: rgba(245,158,11,.2); }
    .badge-danger { background: rgba(239,68,68,.1); color: #fca5a5; border-color: rgba(239,68,68,.2); }
    .badge-neutral { background: var(--surface-2); color: var(--text-2); border-color: var(--border); }

    /* nav */
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; color: var(--text-2); font-size: 13.5px; font-weight: 500; transition: all .1s; }
    .nav-link:hover { background: var(--surface-2); color: var(--text); }
    .nav-link.active { background: var(--surface-2); color: var(--text); }
    .nav-link .icon { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-group { padding: 14px 10px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); font-weight: 600; }

    /* tables */
    table.t { width: 100%; border-collapse: collapse; }
    table.t th { text-align: left; padding: 9px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); font-weight: 600; border-bottom: 1px solid var(--border); }
    table.t td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    table.t tr:last-child td { border-bottom: 0; }
    table.t tbody tr:hover { background: var(--surface-2); }

    /* checkbox */
    .check { width: 14px; height: 14px; appearance: none; -webkit-appearance: none; border: 1.5px solid var(--border-2); border-radius: 3px; background: transparent; cursor: pointer; position: relative; vertical-align: middle; flex-shrink: 0; }
    .check:checked { background: var(--accent); border-color: var(--accent); }
    .check:checked::after { content: ""; position: absolute; left: 3px; top: 0; width: 5px; height: 9px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }

    /* logs */
    pre.logs { background: #050507; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; line-height: 1.65; color: var(--text-2); overflow: auto; white-space: pre-wrap; word-break: break-word; max-height: 65vh; }
    pre.logs::-webkit-scrollbar { width: 10px; height: 10px; }
    pre.logs::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 999px; border: 2px solid #050507; }

    /* toast */
    #toast-wrap { position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { background: var(--surface); border: 1px solid var(--border-2); border-radius: 8px; padding: 10px 14px; font-size: 13px; min-width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,.4); display: flex; gap: 10px; align-items: flex-start; animation: slideIn .15s ease-out; pointer-events: auto; }
    .toast-success { border-left: 3px solid var(--success); }
    .toast-error { border-left: 3px solid var(--danger); }
    .toast-info { border-left: 3px solid #3b82f6; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }

    /* modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); z-index: 40; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-card { background: var(--surface); border: 1px solid var(--border-2); border-radius: 10px; padding: 22px; max-width: 420px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,.5); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a40; }

    /* utility */
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .h-page { font-size: 20px; font-weight: 600; letter-spacing: -.01em; }
    .h-section { font-size: 14px; font-weight: 600; letter-spacing: .005em; }
    .text-muted { color: var(--text-3); }
    .text-soft { color: var(--text-2); }
    .border-line { border-color: var(--border); }
  </style>
</head>
<body class="min-h-screen">
<div id="toast-wrap"></div>

<div class="flex min-h-screen">
  <aside class="w-56 border-r border-line bg-[var(--surface)] flex flex-col">
    <div class="px-5 pt-5 pb-4">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md bg-[var(--accent)] flex items-center justify-center">
          <i data-lucide="send" class="w-4 h-4 text-white"></i>
        </div>
        <div>
          <div class="text-[14px] font-semibold leading-none">Insta Poster</div>
          <div class="text-[10.5px] text-muted mt-1 leading-none">localhost</div>
        </div>
      </div>
    </div>
    <nav class="px-3 space-y-0.5 flex-1 overflow-auto">
      <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/"><i data-lucide="layout-dashboard" class="icon"></i> Dashboard</a>

      <div class="nav-group">Conteúdo</div>
      <a class="nav-link {% if active == 'videos' %}active{% endif %}" href="/videos"><i data-lucide="film" class="icon"></i> Biblioteca</a>
      <a class="nav-link {% if active == 'links' %}active{% endif %}" href="/links"><i data-lucide="link-2" class="icon"></i> Links</a>

      <div class="nav-group">Operação</div>
      <a class="nav-link {% if active == 'accounts' %}active{% endif %}" href="/accounts"><i data-lucide="at-sign" class="icon"></i> Contas Insta</a>
      <a class="nav-link {% if active == 'schedule' %}active{% endif %}" href="/schedule"><i data-lucide="calendar-clock" class="icon"></i> Agenda</a>
      <a class="nav-link {% if active == 'jobs' %}active{% endif %}" href="/jobs"><i data-lucide="play-circle" class="icon"></i> Disparos</a>
      <a class="nav-link {% if active == 'logs' %}active{% endif %}" href="/logs"><i data-lucide="file-text" class="icon"></i> Logs</a>

      {% if is_owner %}
      <div class="nav-group">Admin</div>
      <a class="nav-link {% if active == 'team' %}active{% endif %}" href="/team"><i data-lucide="users" class="icon"></i> Equipe</a>
      <a class="nav-link {% if active == 'workers' %}active{% endif %}" href="/workers"><i data-lucide="monitor" class="icon"></i> Meu PC</a>
      {% endif %}
    </nav>
    <div class="border-t border-line">
      {% if user %}
      <div class="relative" id="user-menu-wrap">
        <button class="w-full flex items-center gap-2.5 px-3 py-3 hover:bg-[var(--surface-2)]" onclick="toggleUserMenu()">
          <div class="w-7 h-7 rounded-full bg-[var(--surface-2)] border border-[var(--border)] flex items-center justify-center text-[11px] font-semibold uppercase text-soft flex-shrink-0">{{ user.email[0] }}</div>
          <div class="min-w-0 flex-1 text-left">
            <div class="text-[12.5px] font-medium truncate">{{ user.email }}</div>
            <div class="text-[10.5px] text-muted leading-none mt-0.5">{% if user.role == 'owner' %}owner{% else %}membro{% endif %}</div>
          </div>
          <i data-lucide="chevron-up" style="width:14px;height:14px;color:var(--text-3)"></i>
        </button>
        <div id="user-menu" class="hidden absolute bottom-full left-2 right-2 mb-1 surface p-1.5 shadow-lg">
          <form method="post" action="/logout" class="m-0">
            <button type="submit" class="nav-link w-full text-left"><i data-lucide="log-out" class="icon"></i> Sair</button>
          </form>
        </div>
      </div>
      {% endif %}
      <div class="px-3 py-2.5 border-t border-line">
        <a href="/workers" class="flex items-center gap-2 px-2 py-1.5 rounded hover:bg-[var(--surface-2)]" id="worker-status-link" title="Status do seu computador">
          <span class="dot dot-muted" id="worker-status-dot"></span>
          <div class="flex-1 min-w-0">
            <div class="text-[11.5px] font-medium leading-none" id="worker-status-text">Computador desligado</div>
            <div class="text-[10px] text-muted mt-0.5" id="worker-status-sub">verificando…</div>
          </div>
        </a>
        <div class="text-[10.5px] text-muted mono mt-1.5" id="host-info">—</div>
      </div>
    </div>
  </aside>

  <main class="flex-1 min-w-0 overflow-auto">
    <div class="max-w-[1280px] mx-auto px-8 py-7">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script>
  window.toast = function(message, kind = 'info') {
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = `toast toast-${kind}`;
    const iconName = kind === 'success' ? 'check-circle-2' : kind === 'error' ? 'alert-circle' : 'info';
    el.innerHTML = `<i data-lucide="${iconName}" style="width:16px;height:16px;flex-shrink:0;margin-top:1px;color:var(--${kind==='success'?'success':kind==='error'?'danger':'text-2'})"></i><div style="line-height:1.45">${message}</div>`;
    wrap.appendChild(el);
    if (window.lucide) lucide.createIcons();
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(8px)'; el.style.transition = 'all .15s'; }, 3500);
    setTimeout(() => el.remove(), 3700);
  };

  window.confirmModal = function({ title, message, danger = false, confirmText = 'Confirmar' }) {
    return new Promise(resolve => {
      const bg = document.createElement('div');
      bg.className = 'modal-bg';
      bg.innerHTML = `
        <div class="modal-card">
          <div class="text-[15px] font-semibold mb-2">${title}</div>
          <div class="text-sm text-soft mb-5 leading-relaxed">${message}</div>
          <div class="flex justify-end gap-2">
            <button class="btn btn-ghost" data-act="cancel">Cancelar</button>
            <button class="btn ${danger ? 'btn-accent' : 'btn-primary'}" data-act="ok" style="${danger ? 'background:var(--danger);color:white' : ''}">${confirmText}</button>
          </div>
        </div>`;
      document.body.appendChild(bg);
      bg.addEventListener('click', e => {
        if (e.target === bg || e.target.dataset.act === 'cancel') { bg.remove(); resolve(false); }
        if (e.target.dataset.act === 'ok') { bg.remove(); resolve(true); }
      });
    });
  };

  window.api = async function(url, opts = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
      ...opts,
    });
    let data = null;
    try { data = await res.json(); } catch (e) {}
    if (!res.ok) {
      const msg = (data && (data.detail || data.message)) || `Erro ${res.status}`;
      throw new Error(msg);
    }
    return data;
  };

  // Host info on sidebar
  fetch('/api/health').then(r => r.json()).then(j => {
    document.getElementById('host-info').textContent = j.host_ip ? `LAN: ${j.host_ip}:8000` : '127.0.0.1:8000';
  }).catch(() => {});

  // Status do worker — polling pra mostrar se tem PC ligado
  async function refreshWorkerStatus() {
    try {
      const workers = await fetch('/api/workers').then(r => r.ok ? r.json() : []);
      const online = workers.filter(w => w.online);
      const dot = document.getElementById('worker-status-dot');
      const txt = document.getElementById('worker-status-text');
      const sub = document.getElementById('worker-status-sub');
      if (!dot) return;
      if (online.length > 0) {
        dot.className = 'dot dot-success dot-pulse';
        txt.textContent = online.length === 1 ? 'Computador conectado' : `${online.length} computadores conectados`;
        sub.textContent = online.map(w => w.name).join(' · ');
      } else if (workers.length > 0) {
        dot.className = 'dot dot-warning';
        txt.textContent = 'Computador desligado';
        sub.textContent = 'abra o worker no PC';
      } else {
        dot.className = 'dot dot-muted';
        txt.textContent = 'Sem computador';
        sub.textContent = 'cadastre em /workers';
      }
    } catch {}
  }
  refreshWorkerStatus();
  setInterval(refreshWorkerStatus, 15000);
  // Expõe pra outras telas poderem chamar
  window.refreshWorkerStatus = refreshWorkerStatus;

  // User menu toggle
  window.toggleUserMenu = function() {
    document.getElementById('user-menu').classList.toggle('hidden');
  };
  document.addEventListener('click', (e) => {
    const wrap = document.getElementById('user-menu-wrap');
    if (wrap && !wrap.contains(e.target)) document.getElementById('user-menu').classList.add('hidden');
  });

  // Render lucide icons
  document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
