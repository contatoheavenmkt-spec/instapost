<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro · Insta Poster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    html, body { background: #09090b; color: #fafafa; font-family: 'Inter', system-ui, sans-serif; }
    .input { width: 100%; background: #09090b; border: 1px solid #2a2a30; border-radius: 6px; padding: 10px 12px; color: #fafafa; font-size: 14px; }
    .input:focus { outline: none; border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236,72,153,.12); }
    .label { display: block; font-size: 12px; color: #a1a1aa; font-weight: 500; margin-bottom: 6px; }
    .btn-accent { background: #ec4899; color: white; padding: 10px 14px; border-radius: 6px; font-weight: 600; font-size: 14px; width: 100%; transition: .12s; }
    .btn-accent:hover { background: #d8377f; }
    .btn-ghost { background: transparent; color: #a1a1aa; padding: 10px 14px; border-radius: 6px; border: 1px solid #2a2a30; font-size: 14px; display: inline-block; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-[420px]">
    <div class="flex items-center justify-center gap-2 mb-6">
      <div class="w-8 h-8 rounded-md bg-[#ec4899] flex items-center justify-center">
        <i data-lucide="send" style="width:16px;height:16px;color:white"></i>
      </div>
      <div class="font-semibold text-[16px]">Insta Poster</div>
    </div>

    <div class="bg-[#101013] border border-[#1f1f23] rounded-xl p-7">
      {% if not token %}
        <div class="text-center py-6">
          <div class="w-12 h-12 rounded-full bg-red-500/10 border border-red-500/20 flex items-center justify-center mx-auto mb-4">
            <i data-lucide="x" style="width:22px;height:22px;color:#fca5a5"></i>
          </div>
          <h1 class="text-[16px] font-semibold mb-2">Convite inválido</h1>
          <p class="text-[13px] text-[#a1a1aa] mb-5">{{ error or 'Esse link de convite não existe, foi revogado ou já foi usado.' }}</p>
          <a href="/login" class="btn-ghost">Ir para login</a>
        </div>
      {% else %}
        <h1 class="text-[18px] font-semibold mb-1">Criar conta</h1>
        <p class="text-[13px] text-[#a1a1aa] mb-5">
          Convite enviado por <span class="text-[#fafafa]">{{ invite.created_by }}</span>.
        </p>

        {% if error %}
        <div class="mb-4 px-3 py-2.5 rounded-md bg-red-500/10 border border-red-500/20 text-[13px] text-red-300 flex items-start gap-2">
          <i data-lucide="alert-circle" style="width:14px;height:14px;flex-shrink:0;margin-top:2px"></i>
          {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/signup/{{ token }}" class="space-y-4">
          <div>
            <label class="label">Email</label>
            <input class="input" type="email" name="email" required autocomplete="email" autofocus />
          </div>
          <div>
            <label class="label">Senha (mín. 6 caracteres)</label>
            <input class="input" type="password" name="password" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn-accent">Criar conta e entrar</button>
        </form>
      {% endif %}
    </div>
  </div>
  <script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
