<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Insta Poster — Save Sessão</title>
  <style>
    :root {
      --bg: #fafbff;
      --surface: #ffffff;
      --border: #e6e8ef;
      --text: #0a0a14;
      --text-2: #4b4e5c;
      --text-3: #8a8f9e;
      --accent: #db2777;
      --accent-grad: linear-gradient(135deg, #ec4899 0%, #db2777 50%, #8b5cf6 100%);
      --accent-soft: rgba(219, 39, 119, 0.10);
      --success: #059669;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      width: 360px; margin: 0; padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); font-size: 13px;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .logo { width: 28px; height: 28px; border-radius: 8px; background: var(--accent-grad);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
    .title { font-weight: 700; font-size: 14px; line-height: 1.1; }
    .subtitle { font-size: 10.5px; color: var(--text-3); margin-top: 2px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .label { font-size: 11px; color: var(--text-2); font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .input, select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12.5px; font-family: inherit; background: var(--surface); color: var(--text); }
    .input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 12px; border-radius: 7px; font-weight: 500; font-size: 12.5px; border: 1px solid transparent; cursor: pointer; width: 100%; transition: all .15s; }
    .btn-primary { background: var(--accent-grad); color: white; box-shadow: 0 4px 12px rgba(219,39,119,.25); }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(219,39,119,.35); }
    .btn-primary:active:not(:disabled) { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border); }
    .btn-ghost:hover { background: #f4f5f9; }

    .msg { font-size: 11.5px; padding: 8px 10px; border-radius: 7px; margin-bottom: 10px; line-height: 1.4; }
    .msg-info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .msg-success { background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
    .msg-error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .msg-warning { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

    .small { font-size: 10.5px; color: var(--text-3); margin-top: 4px; line-height: 1.4; }
    .hidden { display: none !important; }

    .row { display: flex; gap: 6px; }
    .row > * { flex: 1; }

    .footer { text-align: center; font-size: 10.5px; color: var(--text-3); margin-top: 8px; }
    .footer a { color: var(--text-2); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">IP</div>
    <div>
      <div class="title">Insta Poster</div>
      <div class="subtitle" id="header-sub">Save Sessão de qualquer Chrome</div>
    </div>
  </div>

  <div id="msg" class="msg hidden"></div>

  <!-- Setup view (1ª vez ou config) -->
  <div id="view-setup" class="hidden">
    <div class="card">
      <div class="field">
        <label class="label">URL do painel</label>
        <input id="cfg-panel-url" class="input" placeholder="https://instapost.shop" value="https://instapost.shop" />
        <div class="small">Endereço do seu painel (sem barra no final)</div>
      </div>
      <div class="field">
        <label class="label">Token de acesso</label>
        <input id="cfg-token" class="input" type="password" placeholder="Cole o token gerado no painel" />
        <div class="small">Gere em <strong>Contas → Extensão → Gerar token</strong></div>
      </div>
      <button class="btn btn-primary" id="btn-save-config">Conectar ao painel</button>
    </div>
  </div>

  <!-- Main view (capturar cookies) -->
  <div id="view-main" class="hidden">
    <div class="card">
      <div class="field">
        <label class="label">Workspace</label>
        <select id="sel-workspace" class="input"></select>
      </div>
      <div class="field">
        <label class="label">Conta Instagram</label>
        <select id="sel-account" class="input"></select>
        <div class="small">Lista contas cadastradas no painel desse workspace</div>
      </div>
      <button class="btn btn-primary" id="btn-capture">
        <span id="btn-capture-label">Salvar cookies</span>
      </button>
      <div class="small" style="margin-top: 8px; text-align: center">
        Você precisa estar logado na conta no <strong>instagram.com</strong> deste browser
      </div>
    </div>
    <div class="row" style="margin-top: 6px">
      <button class="btn btn-ghost" id="btn-refresh">Recarregar lista</button>
      <button class="btn btn-ghost" id="btn-settings">Configurações</button>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="link-help">Como usar</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
