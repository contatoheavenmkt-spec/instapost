# /etc/nginx/sites-available/instapost.shop
#
# Reverse proxy do Nginx do host pro container do app (porta 8000).
# Coloca esse arquivo em /etc/nginx/sites-available/ e cria symlink em sites-enabled/.
# Depois roda `certbot --nginx -d instapost.shop -d www.instapost.shop` pra HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name instapost.shop www.instapost.shop;

    # Upload de vídeos pode ser grande (Reels HD)
    client_max_body_size 500M;
    proxy_request_buffering off;

    # Timeouts altos pro upload e pra players de vídeo
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_connect_timeout 60;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # Passa info do client real pro app (importante pro tracking de cliques)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming de vídeo: desliga buffering pro player conseguir começar a tocar antes
        proxy_buffering off;

        # WebSocket / SSE (caso vire necessário no futuro)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
